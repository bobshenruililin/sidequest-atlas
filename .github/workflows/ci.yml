name: CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - run: npm run doctor
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run test:contract
      - run: npm run atlas -- schema check
      - run: npm run atlas -- trip validate nordics-2026
      - run: npm run atlas -- sources audit nordics-2026
      - run: npm run atlas -- privacy audit

  build-static:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - name: Build static site for GitHub Pages
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /sidequest-atlas
      - uses: actions/upload-artifact@v4
        with:
          name: static-site
          path: apps/web/out

  e2e:
    runs-on: ubuntu-latest
    needs: build-static
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npx playwright test

  deploy-pages:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [build-static, e2e]
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: static-site
          path: out
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out
      - id: deployment
        uses: actions/deploy-pages@v4
