triangulation:
  againstCanon:
    - Compounding is all we need
    - Atlas is router not monorepo
    - Crown jewels / floor tests bind agents
  informationGaps:
    - Cursor cloud folder-upload UX is not uniformly documented
    - External vault backup may not yet exist on Bob’s machines
  opportunityGaps:
    - Documented operator-intake path for text/photo/voice
    - Compile CROWN_JEWELS.md so prior chats stop evaporating
  falseBargains:
    - Collapsing public/vault/package boundaries to “reduce folders”
    - Committing private media to help cloud agents see files
    - Treating operator visibility as private
  corrections:
    - Most folders encode trust or product boundaries; redundancy is duplicate trip YAML and orphan web routes
    - Photos/voice need reviewed transcripts before compounding
  suggestedImplementations:
    - action: Add docs/operator-intake.md and vault inbox convention
      rationale: Answers how to write; compounds for every future agent
      effort: S
      leverage: high
      owner: agent
    - action: Keep CROWN_JEWELS.md updated after consequential chats
      rationale: Bob asked prior dialogue to be treasured
      effort: S
      leverage: high
      owner: shared
    - action: Later PR — archive orphan web routes; dedupe trip registries
      rationale: Real redundancy; defer mid-Nordics unless blocking
      effort: M
      leverage: medium
      owner: agent
privacyNote: Public-safe operator capture. Sensitive figures stay in vault crown jewels.
