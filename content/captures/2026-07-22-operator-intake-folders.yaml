title: How to write to the agent and what the folders are for
rawText: >-
  How should I write to you directly? Photos of handwritten notes or voice —
  can I upload to a folder? Too many folders — are they for context? Check
  redundancies. Position this repo. What can I do for you? Treasure prior
  chats as crown jewels. Use subagents; take time.
spark: >-
  Intake UX + portfolio hygiene + canon consolidation moment.
