rawText: >-
  Shortlisted for Tung & Ngai Foundation Scholarship Selection Panel interview.
  Slot confirmed 28 July 2026 15:40–15:55 (15 minutes); interview window 27–28 July.
  Application thesis already submitted: HK–Mainland public-health seam; Laidlaw
  heat–cardiovascular research; CHP cross-boundary destination; JD only after UG
  as regulatory training. Request: craft irresistible honest narrative; estimate
  Cantonese vs English likelihood; estimate competition and seats. Godspeed framing.
spark: >-
