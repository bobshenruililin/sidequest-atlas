title: HKU internal transfer LLB vs GLaws routing ambiguity
rawText: >-
  Applied via ASO for internal transfer from BASc GHAD. Email stated LLB Year 1
  as desired curriculum, then soft secondary ask for BSocSc(Govt&Laws)&LLB if
  appropriate. Only Faculty of Law followed up for transcript and IB by 27 Jul
  2026. No Social Sciences/PPA email yet. Asks whether wording failed, whether
  to nudge, and whether LLB emphasis loses GLaws/policy-internship fit.
spark: >-
  Soft dual ask made LLB primary; Law follow-up expected; GLaws silence is
  routing risk not rejection. Clarify ranked preferences today; GLaws better
  policy fit, LLB better speed.
