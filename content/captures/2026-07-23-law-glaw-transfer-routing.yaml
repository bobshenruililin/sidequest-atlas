triangulation:
  againstCanon:
    - Ordinary law without Magic Circle is OK
    - Medicine closed — do not reopen in transfer narrative
    - Law offer reversible internally — do not say that to admissions
    - GHAD/public-health regulation story is the honest bridge
  informationGaps:
    - Whether ASO actually forwarded a GLaws file
    - GLaws 2026 internal-transfer deadline/availability
    - Full text of signed reasons-for-transfer PDF not in workspace
  opportunityGaps:
    - Rank GLaws first if policy/internships are the real goal
    - Same-day ASO + bssgl routing clarification
    - Meet Law document deadline with student-copy transcript
  falseBargains:
    - Waiting silently and assuming GLaws is being reviewed
    - Telling admissions the transfer is reversible or prestige-optional
    - Treating GLaws marketed internships as guaranteed outcomes
  corrections:
    - '"if appropriate" made GLaws optional, not co-equal'
    - Law LLB/BA&LLB email does not cover confirmed GLaws review
    - Prefer ranked explicit curricula in ASO clarification
