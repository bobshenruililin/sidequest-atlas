thesis: How do small, high-trust Northern European societies turn constraints, nature, education, design,
  and patient capital into globally influential systems-and what happens when those systems face the AI
  era, demographic pressure, labor-market weakness, and geopolitical change?
questions:
- Where does high trust show up as an operational advantage rather than a slogan?
- Which constraints produce design discipline, and which constraints now produce fragility?
- How do universities translate public investment into global competence?
- How do food rituals expose climate, labor, welfare, and identity?
- What happens when AI weakens the labor-market bargain that underpins welfare states?
- How are geopolitical pressure and security concerns changing everyday openness?
principles:
- Treat every schedule, price, and opening hour as provisional until live verification.
- 'Use daily life as evidence: transit, lunch, signage, queues, public space, and small transactions.'
- Anchor each city around one systems question and one food experiment.
- Keep normal-day budgets separate from accommodation and long-distance transport.
- Prefer reversible plans with weather and low-energy fallbacks.
