body: |
  The man whose name shows up on your scholarship email and suddenly your GPA
  has a landlord. Nobody on campus has met him in the pantry. Everybody owes
  him a Mainland exchange. Bro didn’t invent Hong Kong — he just invented a
  pipeline that turns Year 1 tryhards into GBA PowerPoints. If your personal
  statement says “contribute to the nation” three times, congratulations,
  you’re speaking fluent Tung.
