body: |
  The Master who went from 27 years as Dean to running the whole show — and
  honestly, we’re not sure he’s noticed the job change because he’s still
  micromanaging summer programs and High Table seating like the legend he is.
  This Real Estate professor has perfected the art of the WhatsApp follow-up
  question, turning every group chat into a rapid-fire investigation. You’ll
  recognize KC’s texting immediately: straight to the point, always thinking
  three steps ahead, and somehow able to convey both authority and genuine care
  in messages like “There should be consequences. Ask AO for it.” Don’t mistake
  his directness for coldness though — this is someone who spent nearly three
  decades making sure every detail of college life ran smoothly. As a 2/F
  alumnus who married a 7/F alumna, KC literally embodies the SJC family spirit.
  Fun fact: after dealing with property law for decades, managing a residence
  hall full of undergrads is probably like a relaxing hobby for him. Though we
  bet he still mentally calculates square footage every time he walks through
  the floors.
